<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste Google Login</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#10203a;margin:40px;line-height:1.5}
    .box{max-width:720px;margin:auto;border:1px solid #d7e1ec;border-radius:18px;padding:24px;box-shadow:0 12px 28px rgba(18,42,66,.10)}
    h1{color:#071a70;margin-top:0}
    code{background:#f1f5f9;padding:2px 6px;border-radius:6px}
    #status{margin-top:18px;padding:14px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0;white-space:pre-wrap}
    .ok{color:#166534;font-weight:700}.bad{color:#991b1b;font-weight:700}
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="box">
    <h1>Teste Google Login</h1>
    <p>Este arquivo testa apenas o login Google, separado do simulador.</p>
    <p>Conta autorizada: <code>mariocnascimento@gmail.com</code></p>

    <div id="g_id_onload"
      data-client_id="1038408690730-bk2oqlv00mjtteeeogtcu7im5548fklp.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="signin_with"
      data-shape="pill"
      data-logo_alignment="left">
    </div>

    <div id="status">Aguardando login...</div>
  </div>

<script>
const AUTHORIZED_EMAIL = "mariocnascimento@gmail.com";

function decodeJwtPayload(token){
  const payload = token.split('.')[1];
  const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
  const json = decodeURIComponent(atob(normalized).split('').map(c => {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(json);
}

function handleCredentialResponse(response){
  const status = document.getElementById('status');
  try{
    const data = decodeJwtPayload(response.credential);
    const email = data.email || '';
    const name = data.name || '';
    const verified = data.email_verified === true;

    if(email === AUTHORIZED_EMAIL && verified){
      status.innerHTML = `<span class="ok">LOGIN OK</span>\nNome: ${name}\nE-mail: ${email}\nVerificado: ${verified}\n\nEste teste funcionou. A integração no simulador pode usar este mesmo fluxo.`;
    }else{
      status.innerHTML = `<span class="bad">LOGIN BLOQUEADO</span>\nE-mail recebido: ${email}\nVerificado: ${verified}\n\nA conta autenticada não é a autorizada.`;
    }
  }catch(err){
    status.innerHTML = `<span class="bad">ERRO AO LER TOKEN</span>\n${err.message}`;
  }
}
</script>
</body>
</html>
